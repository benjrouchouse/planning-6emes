<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning SMT</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="1772575390613.png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0f172a;
            --accent: #38bdf8;
            --success: #22c55e;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 0;
        }

        /* --- NAVIGATION --- */
        .nav-tabs {
            display: flex;
            background: #1e293b;
            padding: 5px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--accent);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.5;
        }

        .tab-btn.active { opacity: 1; color: var(--accent); }

        .view { display: none; padding: 10px; }
        .view.active { display: block; }

        /* --- STYLES CALENDRIER --- */
        .header-sticky { text-align: center; padding: 10px 0; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        input[type="date"] { padding: 8px; border-radius: 8px; border: none; }
        .btn-today { background: var(--accent); color: #0f172a; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }

        #calendar { display: flex; flex-direction: column; gap: 8px; max-width: 500px; margin: 0 auto; }
        .day-card { border-radius: 10px; color: #1e293b; font-weight: 500; scroll-margin-top: 140px; overflow: hidden; border: 3px solid transparent; transition: 0.2s; }
        .day-card-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .work-day { background-color: #cbd5e1; } 
        .weekend { background-color: #475569; color: #cbd5e1; } 
        .vacation { background-color: #d1fae5; } 
        .holiday { background-color: #fee2e2; } 
        
        /* LA SURBRILLANCE ROUGE PERSISTANTE */
        .highlight { border-color: #ef4444 !important; transform: scale(1.02); z-index: 10; }

        .status-label { font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.1); margin-left: 5px; }
        .cycle-badge { background: rgba(0,0,0,0.1); padding: 4px 12px; border-radius: 10px; font-weight: bold; }
        
        .day-details { max-height: 0; overflow: hidden; transition: 0.3s; background: rgba(255,255,255,0.25); text-align: left; }
        .day-card.active .day-details { max-height: 600px; }
        .day-details-content { padding: 15px; font-size: 0.85rem; line-height: 1.4; }
        
        .task-list { padding: 10px; background: rgba(255, 255, 255, 0.3); border-radius: 8px; }
        .task-list strong { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #0f172a; border-bottom: 1px solid rgba(0,0,0,0.1); text-transform: uppercase; }
        .task-item { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }

        /* --- STYLES TACHES SMS --- */
        .cl-container { max-width: 500px; margin: 0 auto; }
        .cl-header { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .progress-bar { height: 10px; background: #0f172a; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.5s; }
        
        .cl-item { background: white; color: #1e293b; padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; align-items: center; cursor: pointer; border-left: 5px solid var(--accent); }
        .cl-item.done { border-left-color: var(--success); opacity: 0.6; }
        .cl-item.done .text { text-decoration: line-through; }
        .cl-item input { margin-right: 12px; transform: scale(1.3); }
        .cl-item .time { font-weight: bold; color: #64748b; margin-right: 10px; font-size: 0.8rem; min-width: 45px; }
        .cl-item .icon { font-size: 1.2rem; margin-right: 10px; }
        
        .btn-reset { width: 100%; padding: 15px; background: #ef4444; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; }

        #counter-section { text-align: center; margin-top: 30px; padding: 20px; opacity: 0.4; font-size: 0.7rem; border-top: 1px solid #334155; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <button id="btn-plan" class="tab-btn active" onclick="switchView('planning')">CALENDRIER</button>
        <button id="btn-sms" class="tab-btn" onclick="switchView('sms')">TÂCHES SMS</button>
    </nav>

    <div id="planning-view" class="view active">
        <div class="header-sticky">
            <h1 style="margin:0 0 10px 0">Planning SMT</h1>
            <div class="controls">
                <input type="date" id="datePicker">
                <button class="btn-today" onclick="scrollToToday()">Aujourd'hui</button>
            </div>
        </div>
        <div id="calendar"></div>
    </div>

    <div id="sms-view" class="view">
        <div class="cl-container">
            <div class="cl-header">
                <div id="cl-count" style="font-weight: bold; color: var(--accent);">0 / 14 tâches effectuées</div>
                <div class="progress-bar"><div id="cl-bar" class="progress-fill"></div></div>
            </div>
            <div id="checklist-list"></div>
            <button class="btn-reset" onclick="resetChecklist()">🔄 RÉINITIALISER LA GARDE</button>
        </div>
    </div>

    <div id="counter-section">
        <div id="sfc68u3z7f41qjpyh46j7y1k415r2j2g791"></div>
        <script type="text/javascript" src="https://counter9.optistats.ovh/private/counter.js?c=68u3z7f41qjpyh46j7y1k415r2j2g791&down=async" async></script>
    </div>

    <script>
        const cycle = ["4 & 2", "5 & 3", "6 & 4", "1 & 5", "2 & 6", "3 & 1"];
        const joursFeries = ["2026-01-01", "2026-04-06", "2026-05-01", "2026-05-08", "2026-05-14", "2026-05-25", "2026-07-14", "2026-08-15", "2026-11-01", "2026-11-11", "2026-12-25"];
        const smsTasks = [
            { t: "07h10", d: "Passation SMS", i: "🤝" },
            { t: "07h20", d: "Vérification feuille de garde + armement VRCC", i: "🚔" },
            { t: "07h30", d: "Appel du personnel", i: "📢" },
            { t: "08h30", d: "Vérification des chambrées", i: "🛌" },
            { t: "09h30", d: "Vérification inventaires SKYUREL", i: "🐿️" },
            { t: "14h00", d: "Appel du personnel", i: "📢" },
            { t: "17h00", d: "Désarmer la VRCC", i: "🔓" },
            { t: "17h30", d: "Couleurs (Cf feuille de service État major)", i: "🇫🇷" },
            { t: "19h00", d: "Si corvée : renseigner KIMOCE", i: "💻" },
            { t: "19h30", d: "Faire le tableau des postes du lendemain", i: "📝" },
            { t: "20h00", d: "Désarmer le VSAV 2", i: "🚑" },
            { t: "22h00", d: "Passer la feuille de garde", i: "📁" },
            { t: "22h10", d: "Ronde SMS", i: "🔦" },
            { t: "22h30", d: "Vérification du cahier cuisine", i: "🍳" }
        ];

        function isFirstMonday(date) { return date.getDay() === 1 && date.getDate() <= 7; }
        function checkVacancesB(dateStr) {
            const v = [["2026-02-14","2026-03-01"], ["2026-04-11","2026-04-26"], ["2026-07-04","2026-08-31"], ["2026-10-17","2026-11-01"], ["2026-12-19","2026-12-31"]];
            return v.some(p => dateStr >= p[0] && dateStr <= p[1]);
        }

        const calendar = document.getElementById("calendar");
        let d = new Date(2026, 0, 1);
        while(d.getFullYear() === 2026) {
            const iso = d.toISOString().split('T')[0];
            const dayOfWeek = d.getDay();
            const diffDays = Math.floor((d - new Date(2026,0,1))/(1000*60*60*24));
            
            let matin = [], apresMidi = [];
            if(d.getDate() === 1) matin.push("🩺 Vérification du DAE du standard");

            switch(dayOfWeek) {
                case 1: 
                    matin.push("📜 Lecture du code d'honneur", "Inspection des EPI", "Vérification des ARI et air respirable"); 
                    if(isFirstMonday(d)) matin.push("☢️ Contrôle des appareils de mesures (explosimètres et dosimètres)");
                    apresMidi = ["🏟️ Sport collectif (stade de la Jouvène)"]; 
                    break;
                case 2: 
                    matin.push("Vérification des échelles à mains", "Vérification du lot tramway"); 
                    apresMidi = ["💪 Renforcement musculaire (MONISPORT GPTS)"]; 
                    break;
                case 3: 
                    matin.push("Vérification des thermiques"); 
                    apresMidi = ["💧 Mise en pompe / (FI / VDLHR)"]; 
                    break;
                case 4: 
                    matin.push("Vérification des LSPCC et sac PS (FI)", "Contrôle des cuves gasoil (saisir sur Kimoce) + tourner la vanne 3 voies"); 
                    apresMidi = ["⚙️ Travail dans les services"]; 
                    break;
                case 5: 
                    matin.push("Vérification des pneumatiques"); 
                    if(d.getDate()<=7) matin.push("🚒 Protocole 3 du FI"); 
                    apresMidi = ["🧹 Services / Propreté générale"]; 
                    break;
                case 6: 
                    matin.push("🏗️ Manœuvre secours routiers à Fert Recyclage"); 
                    apresMidi = ["🧼 Nettoyage des containers à déchets et du véhicule de servitude"]; 
                    break;
                case 0: 
                    matin.push("🚑 Protocole des VSAV et changement d'ordre", "🧪 Commande oxygène avant 10h"); 
                    break;
            }

            let cls = "work-day", status = "";
            if(joursFeries.includes(iso)) { cls = "holiday"; status = '<span class="status-label">🚩 FÉRIÉ</span>'; }
            else if(checkVacancesB(iso)) { cls = "vacation"; status = '<span class="status-label">🏖️ VACANCES</span>'; }
            else if(dayOfWeek === 0 || dayOfWeek === 6) cls = "weekend";

            const card = document.createElement('div');
            card.id = "date-"+iso;
            card.className = "day-card " + cls;
            card.innerHTML = `
                <div class="day-card-header" onclick="selectDay(this.parentElement)">
                    <div>${d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'})}${status}</div>
                    <div class="cycle-badge">${cycle[diffDays % 6]}</div>
                </div>
                <div class="day-details"><div class="day-details-content">
                    <div class="task-list">
                        <strong>MATIN</strong>${matin.map(t=>`<div class="task-item">🔹 ${t}</div>`).join('')}
                        ${apresMidi.length?`<strong style="margin-top:10px">APRÈS-MIDI</strong>${apresMidi.map(t=>`<div class="task-item">🔹 ${t}</div>`).join('')}`:''}
                    </div>
                </div></div>
            `;
            calendar.appendChild(card);
            d.setDate(d.getDate()+1);
        }

        function switchView(name) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name + '-view').classList.add('active');
            document.getElementById('btn-' + (name === 'planning' ? 'plan' : 'sms')).classList.add('active');
        }

        // FONCTION DE SELECTION (BORDURE + OUVERTURE)
        function selectDay(card) {
            const wasActive = card.classList.contains('active');
            
            // On retire tout partout
            document.querySelectorAll('.day-card').forEach(c => {
                c.classList.remove('active');
                c.classList.remove('highlight');
            });

            // On applique au nouveau
            card.classList.add('highlight');
            if(!wasActive) card.classList.add('active');
        }

        function scrollToToday() {
            const now = new Date();
            const iso = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const el = document.getElementById("date-"+iso);
            if(el) {
                selectDay(el);
                el.scrollIntoView({behavior:'smooth', block:'center'});
            }
        }

        function loadChecklist() {
            const list = document.getElementById('checklist-list');
            const saved = JSON.parse(localStorage.getItem('smt_tasks')) || {};
            list.innerHTML = smsTasks.map((task, i) => `
                <div class="cl-item ${saved[i] ? 'done' : ''}" onclick="toggleTask(${i})">
                    <input type="checkbox" ${saved[i] ? 'checked' : ''}>
                    <span class="time">${task.t}</span>
                    <span class="icon">${task.i}</span>
                    <span class="text">${task.d}</span>
                </div>
            `).join('');
            updateProgress();
        }

        function toggleTask(i) {
            let saved = JSON.parse(localStorage.getItem('smt_tasks')) || {};
            saved[i] = !saved[i];
            localStorage.setItem('smt_tasks', JSON.stringify(saved));
            loadChecklist();
        }

        function updateProgress() {
            const saved = JSON.parse(localStorage.getItem('smt_tasks')) || {};
            const done = Object.values(saved).filter(v => v).length;
            document.getElementById('cl-count').innerText = `${done} / ${smsTasks.length} tâches effectuées`;
            document.getElementById('cl-bar').style.width = (done/smsTasks.length*100) + '%';
        }

        function resetChecklist() {
            if(confirm("Réinitialiser la journée ?")) {
                localStorage.removeItem('smt_tasks');
                loadChecklist();
            }
        }

        document.getElementById('datePicker').addEventListener('change', function(){
            const el = document.getElementById("date-"+this.value);
            if(el) { selectDay(el); el.scrollIntoView({behavior:'smooth', block:'center'}); }
        });

        loadChecklist();
    </script>
</body>
</html>
