<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMS SMT 2026</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #0f172a; --accent: #38bdf8; --success: #22c55e;
            --card-bg: #1e293b; --text: #f8fafc; --warning: #f59e0b;
            --vacation: #a855f7;
        }
        body.night-mode {
            --bg: #000; --accent: #ff4444; --card-bg: #1a0000;
            --text: #ff4444; --success: #880000; --vacation: #550055;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            transition: 0.3s; padding-bottom: 40px; -webkit-user-select: none;
        }

        .header-logo { text-align: center; margin-top: 10px; font-size: 4rem; }

        .nav-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; padding: 15px; max-width: 500px; margin: 0 auto;
        }
        .nav-btn {
            background: var(--card-bg); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; aspect-ratio: 1 / 1;
            font-weight: bold; border: 1px solid #334155; transition: 0.1s;
        }
        .nav-btn:active { transform: scale(0.95); background: var(--accent); color: var(--bg); }
        .nav-btn span.emoji { font-size: 2.5rem; margin-bottom: 10px; }

        .view { display: none; padding: 15px; animation: fadeIn 0.2s; }
        .view.active { display: block; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 10px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }

        #today-btn { 
            width: 100%; background: var(--card-bg); border: 2px solid var(--accent); 
            border-radius: 12px; padding: 15px; cursor: pointer; font-weight: bold; color: var(--accent);
            margin-bottom: 15px; font-size: 1rem;
        }

        .day-card { border-radius: 12px; color: #1e293b; margin-bottom: 10px; overflow: hidden; border: 3px solid transparent; }
        .day-card.work-day { background: #cbd5e1; }
        .day-card.weekend { background: #475569; color: white; }
        .day-card.vacation { background: var(--vacation); color: white; }
        .day-card.today { border-color: #ef4444; transform: scale(1.01); box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        
        .card-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .details { max-height: 0; overflow: hidden; transition: 0.3s; background: rgba(0,0,0,0.05); }
        .day-card.active .details { max-height: 200px; padding: 15px; border-top: 1px solid rgba(0,0,0,0.1); }

        .cl-item { background: white; color: #1e293b; padding: 15px; margin-bottom: 8px; border-radius: 12px; display: flex; align-items: center; border-left: 6px solid var(--accent); transition: 0.2s; cursor: pointer; }
        .cl-item.done { opacity: 0.5; border-left-color: var(--success); }
        .btn-wa { background: #25d366; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        
        .prog-container { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .bar-bg { width: 100%; height: 12px; background: #334155; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .bar-fill { height: 100%; width: 0%; background: var(--accent); transition: 0.4s ease-out; }

        textarea { width: 100%; box-sizing: border-box; font-size: 16px; border: 1px solid #334155; height: 250px; background: var(--card-bg); color: white; border-radius: 12px; padding: 15px; }
    </style>
</head>
<body>

    <div style="display:flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
        <h2 style="margin:0; color:var(--accent);">SMS SMT 2026</h2>
        <button onclick="document.body.classList.toggle('night-mode')" style="background:var(--card-bg); border:1px solid var(--accent); color:var(--accent); border-radius:50%; width:40px; height:40px;">🌙</button>
    </div>

    <div class="header-logo">🚒</div>

    <div id="menu-view" class="view active">
        <div class="nav-grid">
            <div class="nav-btn" onclick="switchView('planning')"><span class="emoji">📅</span>Planning</div>
            <div class="nav-btn" onclick="switchView('sms')"><span class="emoji">✅</span>SMS</div>
            <div class="nav-btn" onclick="switchView('proc')"><span class="emoji">📚</span>Procédures</div>
            <div class="nav-btn" onclick="switchView('passation')"><span class="emoji">📝</span>Passation</div>
        </div>
        <p id="info-relance" style="text-align:center; color:var(--accent); font-weight:bold; margin-top:20px; font-size:1.2rem;"></p>
    </div>

    <div id="planning-view" class="view">
        <button class="back-btn" onclick="switchView('menu')">← Menu</button>
        <button id="today-btn" onclick="scrollToToday()">📍 Revenir à aujourd'hui</button>
        <div id="calendar-container"></div>
    </div>

    <div id="sms-view" class="view">
        <button class="back-btn" onclick="switchView('menu')">← Menu</button>
        <div class="prog-container">
            <div style="display:flex; justify-content:space-between; font-size:0.9rem; font-weight:bold;">
                <span>Progression Garde</span>
                <span id="sms-percent">0%</span>
            </div>
            <div class="bar-bg"><div id="sms-bar" class="bar-fill"></div></div>
        </div>
        <div id="sms-list"></div>
        <button onclick="resetSMS()" style="width:100%; background:#ef4444; color:white; border:none; padding:15px; border-radius:12px; font-weight:bold; margin-top:20px;">🔄 RÉINITIALISER LA GARDE</button>
    </div>

    <div id="proc-view" class="view">
        <button class="back-btn" onclick="switchView('menu')">← Menu</button>
        <div style="background:var(--card-bg); padding:20px; border-radius:15px; border:1px solid #334155;">
            <h3 style="color:var(--accent); margin-top:0;">⛽ Carburant Jeudi</h3>
            Saisie <b>Kimoce</b> avant 12h.<br>
            Scan BL à : <i style="color:var(--accent)">gp_piecesengins@intrabat.bmpm.fr</i>
        </div>
    </div>

    <div id="passation-view" class="view">
        <button class="back-btn" onclick="switchView('menu')">← Menu</button>
        <textarea id="memo" placeholder="Ta passation..." oninput="localStorage.setItem('smt_memo', this.value)"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="copyToClipboard()" style="flex: 1; background: var(--card-bg); color: var(--accent); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; font-weight: bold;">📋 Copier</button>
            <button class="btn-wa" onclick="shareWA()">📤 WhatsApp</button>
        </div>
        <div id="copy-toast" style="display:none; text-align:center; color:var(--success); font-weight:bold; margin-top:10px;">✅ Texte copié !</div>
    </div>

<script>
    // Configuration du cycle basée sur : 16 Mars 2026 = 6 & 4
    const cycleNames = ["6 & 4", "1 & 5", "2 & 6", "3 & 1", "4 & 2", "5 & 3"];
    const refDate = new Date(2026, 2, 16); // 16 Mars 2026
    const vacancesB = [{s:"2026-02-14",e:"2026-03-01"},{s:"2026-04-11",e:"2026-04-26"},{s:"2026-07-04",e:"2026-08-31"},{s:"2026-10-17",e:"2026-11-01"},{s:"2026-12-19",e:"2026-12-31"}];
    
    const smsTasks = [
        "07:30 Armée VRCC 👨🏻‍🚒", "07:30 Feuilles de garde du jour 🖥️",
        "10:00 Inventaires SKUYREL 🐿️", "17:00 Désarmée VRCC 👨🏻‍🚒",
        "18:00 Couleurs soir 🇫🇷", "20:00 Désarmer VSAV 2 🚑",
        "20:30 Tableau des postes 📊", "20:45 Feuille de garde lendemain 🖥️",
        "21:00 Imprimer feuille permissionnaires 📄", "21:15 Remplir Kimos 🖥️",
        "21:30 Signature cahier cuisine 👨‍🍳", "22:00 Ronde 22h 👨🏻‍🚒"
    ];

    function getCycleForDate(d) {
        // Calcul du nombre de jours entre la date cible et la date de référence
        const diffTime = d.getTime() - refDate.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        let index = diffDays % 6;
        if (index < 0) index += 6; // Gère les dates avant le 16 mars
        return cycleNames[index];
    }

    function getTasks(d) {
        const day = d.getDay();
        if(day===1) return "Matin: Code d'honneur, EPI, ARI. AM: Sport.";
        if(day===2) return "Matin: Échelles, Lot Tramway. AM: Renfo.";
        if(day===3) return "Matin: Thermiques. AM: Mise en pompe.";
        if(day===4) return "Matin: LSPCC, Sac PS. Cuves Gasoil. AM: Services.";
        if(day===5) return "Matin: Pneumatiques. AM: Services.";
        if(day===6) return "Manœuvre SR. AM: Containers.";
        return "Protocole VSAV, Commande O2, Inventaire CCF.";
    }

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id + '-view').classList.add('active');
        window.scrollTo(0,0);
        if(id === 'sms') renderSMS();
    }

    function init() {
        const cal = document.getElementById('calendar-container');
        cal.innerHTML = '';
        const today = new Date();
        today.setHours(0,0,0,0); // On cale sur minuit pour la comparaison
        
        let d = new Date(2026, 0, 1);
        while(d.getFullYear() === 2026) {
            // Création d'un ID de date propre sans décalage ISO
            const dateId = `date-${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
            
            const isVac = vacancesB.some(v => {
                const start = new Date(v.s); const end = new Date(v.e);
                return d >= start && d <= end;
            });
            const isToday = d.getTime() === today.getTime();
            const cycleText = getCycleForDate(d);
            
            const card = document.createElement('div');
            card.id = dateId;
            card.className = `day-card ${isVac?'vacation':(d.getDay()==0||d.getDay()==6?'weekend':'work-day')} ${isToday?'today':''}`;
            card.innerHTML = `
                <div class="card-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})} ${isVac?'🏖️':''}</span>
                    <span style="background:rgba(0,0,0,0.1);padding:4px 8px;border-radius:8px;">${cycleText}</span>
                </div>
                <div class="details">${getTasks(d)}</div>
            `;
            cal.appendChild(card);
            if(isToday) document.getElementById('info-relance').innerText = `Aujourd'hui : ${cycleText}`;
            d.setDate(d.getDate()+1);
        }
        renderSMS();
        document.getElementById('memo').value = localStorage.getItem('smt_memo') || "";
    }

    function renderSMS() {
        const saved = JSON.parse(localStorage.getItem('smt_sms')) || {};
        let done = 0;
        document.getElementById('sms-list').innerHTML = smsTasks.map((t,i) => {
            if(saved[i]) done++;
            return `<div class="cl-item ${saved[i]?'done':''}" onclick="toggleSMS(${i})">
                <input type="checkbox" ${saved[i]?'checked':''} style="pointer-events:none">
                <span style="margin-left:10px">${t}</span>
            </div>`;
        }).join('');
        const pc = Math.round((done / smsTasks.length) * 100);
        document.getElementById('sms-bar').style.width = pc + "%";
        document.getElementById('sms-percent').innerText = pc + "%";
    }

    function toggleSMS(i) {
        let saved = JSON.parse(localStorage.getItem('smt_sms')) || {};
        saved[i] = !saved[i];
        localStorage.setItem('smt_sms', JSON.stringify(saved));
        renderSMS();
    }

    function resetSMS() { if(confirm("Réinitialiser les tâches ?")) { localStorage.removeItem('smt_sms'); renderSMS(); } }

    function copyToClipboard() {
        const m = document.getElementById('memo');
        m.select();
        m.setSelectionRange(0, 99999); 
        document.execCommand('copy');
        const t = document.getElementById('copy-toast');
        t.style.display='block'; setTimeout(()=>t.style.display='none', 2000);
    }

    function shareWA() {
        const text = document.getElementById('memo').value;
        copyToClipboard();
        window.location.href = "whatsapp://send?text=" + encodeURIComponent(text);
    }

    function scrollToToday() {
        const d = new Date();
        const dateId = `date-${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        const el = document.getElementById(dateId);
        if(el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('active'); // Ouvre les détails du jour
        }
    }

    window.onload = init;
</script>
</body>
</html>
