<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning 6èmes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 10px;
            text-align: center;
        }

        .header-sticky {
            position: sticky;
            top: 0;
            background: #0f172a;
            padding: 15px 0;
            z-index: 100;
            border-bottom: 1px solid #334155;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="date"] {
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
        }

        .btn-today {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #calendar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 500px;
            margin: 20px auto;
        }

        .day-card {
            display: flex;
            flex-direction: column;
            padding: 0;
            border-radius: 10px;
            color: #1e293b;
            font-weight: 500;
            scroll-margin-top: 140px;
            transition: all 0.3s ease;
            overflow: hidden;
            cursor: pointer;
        }

        .day-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .work-day { background-color: #cbd5e1; } 
        .weekend { background-color: #475569; color: #cbd5e1; } 
        .vacation { background-color: #d1fae5; } 
        .holiday { background-color: #fee2e2; }

            display: flex;
            align-items: center;
            gap: 8px;
            text-align: left;
        }
