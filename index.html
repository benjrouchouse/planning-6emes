<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning 6èmes</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 10px;
            text-align: center;
        }

        .header-sticky {
            position: sticky;
            top: 0;
            background: #0f172a;
            padding: 15px 0;
            z-index: 100;
            border-bottom: 1px solid #334155;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="date"] {
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
        }

        .btn-today {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #calendar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 500px;
            margin: 20px auto;
        }

        .day-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-radius: 10px;
            color: #1e293b;
            font-weight: 500;
            scroll-margin-top: 140px;
            transition: all 0.3s;
        }

        /* --- COULEURS DEMANDÉES --- */
        .work-day { background-color: #cbd5e1; } /* Gris/Bleu standard pour la semaine */
        .weekend { background-color: #475569; color: #cbd5e1; } /* Sombre pour le repos */
        .vacation { background-color: #d1fae5; } /* Vert pastel très pâle (Vacances) */
        .holiday { background-color: #fee2e2; } /* Rouge/Rose pastel très pâle (Férié) */

        .cycle-badge {
            background: rgba(0, 0, 0, 0.1);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .highlight {
            border: 3px solid #38bdf8 !important;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="header-sticky">
        <h1>Planning 6èmes</h1>
        <div class="controls">
            <input type="date" id="datePicker">
            <button class="btn-today" onclick="scrollToToday()">Aujourd'hui</button>
        </div>
    </div>

    <div id="calendar"></div>

    <script>
        const cycle = ["4 & 2", "5 & 3", "6 & 4", "1 & 5", "2 & 6", "3 & 1"];
        
        const joursFeries = [
            "2026-01-01", "2026-04-06", "2026-05-01", "2026-05-08", 
            "2026-05-14", "2026-05-25", "2026-07-14", "2026-08-15",
            "2026-11-01", "2026-11-11", "2026-12-25"
        ];

        function checkVacancesB(dateStr) {
            // Vacances Zone B 2026
            if (dateStr >= "2026-02-14" && dateStr <= "2026-03-01") return true;
            if (dateStr >= "2026-04-11" && dateStr <= "2026-04-26") return true;
            if (dateStr >= "2026-07-04" && dateStr <= "2026-08-31") return true;
            if (dateStr >= "2026-10-17" && dateStr <= "2026-11-01") return true;
            if (dateStr >= "2026-12-19" && dateStr <= "2026-12-31") return true;
            return false;
        }

        const startDate = new Date("2026-01-01");
        const endDate = new Date("2026-12-31");
        const calendar = document.getElementById("calendar");
        let currentDate = new Date(startDate);

        while (currentDate <= endDate) {
            const div = document.createElement("div");
            const dateIso = currentDate.toISOString().split('T')[0];
            const dayOfWeek = currentDate.getDay();
            div.id = "date-" + dateIso;
            
            const diffDays = Math.floor((currentDate - startDate) / (1000 * 60 * 60 * 24));
            const cycleText = cycle[diffDays % cycle.length];

            // Attribution des classes de couleur
            if (joursFeries.includes(dateIso)) {
                div.className = "day-card holiday";
                div.innerHTML = `<span>${formatDate(currentDate)} 🚩</span> <span class="cycle-badge">FÉRIÉ</span>`;
            } else if (checkVacancesB(dateIso)) {
                div.className = "day-card vacation";
                div.innerHTML = `<span>${formatDate(currentDate)} 🏖️</span> <span class="cycle-badge">${cycleText}</span>`;
            } else if (dayOfWeek === 0 || dayOfWeek === 6) {
                div.className = "day-card weekend";
                div.innerHTML = `<span>${formatDate(currentDate)}</span> <span class="cycle-badge">Repos</span>`;
            } else {
                div.className = "day-card work-day";
                div.innerHTML = `<span>${formatDate(currentDate)}</span> <span class="cycle-badge">${cycleText}</span>`;
            }

            calendar.appendChild(div);
            currentDate.setDate(currentDate.getDate() + 1);
        }

        function formatDate(date) {
            let options = { weekday: 'long', day: 'numeric', month: 'long' };
            let s = date.toLocaleDateString('fr-FR', options);
            return date.getDate() === 1 ? s.replace(" 1 ", " 1er ") : s;
        }

        function scrollToToday() {
            const dateIso = new Date().toISOString().split('T')[0];
            const element = document.getElementById("date-2026-" + dateIso.split('-')[1] + "-" + dateIso.split('-')[2]);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                element.classList.add('highlight');
                setTimeout(() => element.classList.remove('highlight'), 2000);
            }
        }

        document.getElementById('datePicker').addEventListener('change', function() {
            const element = document.getElementById("date-" + this.value);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                element.classList.add('highlight');
                setTimeout(() => element.classList.remove('highlight'), 2000);
            }
        });
    </script>
</body>
</html>
