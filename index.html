<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning 6èmes</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a202c;
            color: white;
            margin: 0;
            padding: 10px;
            text-align: center;
        }

        .header-sticky {
            position: sticky;
            top: 0;
            background: #1a202c;
            padding: 15px 0;
            z-index: 100;
            border-bottom: 1px solid #4a5568;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="date"] {
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
        }

        .btn-today {
            background: #38bdf8;
            color: #1a202c;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #calendar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 500px;
            margin: 20px auto;
        }

        .day-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-radius: 12px;
            color: #1e293b;
            font-weight: 500;
            scroll-margin-top: 140px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .cycle-badge {
            background: rgba(255, 255, 255, 0.4);
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
        }

        /* Styles spécifiques Zone B & Repos */
        .weekend { background-color: #e2e8f0 !important; color: #64748b !important; }
        .holiday { background-color: #ffedd5 !important; color: #9a3412 !important; border: 2px solid #fdba74; }
        .vacation { background-color: #d1fae5 !important; color: #065f46 !important; }

        .highlight {
            border: 3px solid #38bdf8 !important;
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="header-sticky">
        <h1>Planning 6èmes</h1>
        <div class="controls">
            <input type="date" id="datePicker">
            <button class="btn-today" onclick="scrollToToday()">Aujourd'hui</button>
        </div>
    </div>

    <div id="calendar"></div>

    <script>
        const cycleData = [
            { label: "4 & 2", color: "#C1E1C1" },
            { label: "5 & 3", color: "#FFB3BA" },
            { label: "6 & 4", color: "#BDB2FF" },
            { label: "1 & 5", color: "#FFDFBA" },
            { label: "2 & 6", color: "#BAE1FF" },
            { label: "3 & 1", color: "#FFFFBA" }
        ];

        // Jours Fériés 2026 (Fixes et Mobiles)
        const joursFeries = [
            "2026-01-01", "2026-04-06", "2026-05-01", "2026-05-08", 
            "2026-05-14", "2026-05-25", "2026-07-14", "2026-08-15",
            "2026-11-01", "2026-11-11", "2026-12-25"
        ];

        // Calendrier Vacances Zone B (Aix-Marseille, Nice, etc.)
        function getStatutJour(dateStr) {
            // Vacances Hiver 2026 : 14 fév au 2 mars
            if (dateStr >= "2026-02-14" && dateStr <= "2026-03-01") return "vacation";
            // Vacances Printemps 2026 : 11 avril au 27 avril
            if (dateStr >= "2026-04-11" && dateStr <= "2026-04-26") return "vacation";
            // Pont de l'Ascension : 14 mai au 17 mai
            if (dateStr >= "2026-05-14" && dateStr <= "2026-05-17") return "vacation";
            // Grandes Vacances : 4 juillet au 31 août
            if (dateStr >= "2026-07-04" && dateStr <= "2026-08-31") return "vacation";
            // Toussaint 2026 : 17 oct au 2 nov
            if (dateStr >= "2026-10-17" && dateStr <= "2026-11-01") return "vacation";
            // Noël 2026 : 19 déc au 4 jan 2027
            if (dateStr >= "2026-12-19" && dateStr <= "2026-12-31") return "vacation";
            
            return "travail";
        }

        const startDate = new Date("2026-01-01");
        const endDate = new Date("2028-12-31");
        const calendar = document.getElementById("calendar");

        let currentDate = new Date(startDate);

        while (currentDate <= endDate) {
            const div = document.createElement("div");
            div.className = "day-card";
            
            const dateIso = currentDate.toISOString().split('T')[0];
            div.id = "date-" + dateIso;

            const dayOfWeek = currentDate.getDay();
            const diffDays = Math.floor((currentDate - startDate) / (1000 * 60 * 60 * 24));
            const cInfo = cycleData[diffDays % cycleData.length];
            const statut = getStatutJour(dateIso);

            if (joursFeries.includes(dateIso)) {
                div.classList.add("holiday");
                div.innerHTML = `<div>${formatDate(currentDate)} 🚩</div><div class="cycle-badge">FÉRIÉ</div>`;
            } else if (statut === "vacation") {
                div.classList.add("vacation");
                div.innerHTML = `<div>${formatDate(currentDate)} 🏖️</div><div class="cycle-badge">${cInfo.label}</div>`;
            } else if (dayOfWeek === 0 || dayOfWeek === 6) {
                div.classList.add("weekend");
                div.innerHTML = `<div>${formatDate(currentDate)}</div><div class="cycle-badge">WEEK-END</div>`;
            } else {
                div.style.backgroundColor = cInfo.color;
                div.innerHTML = `<div>${formatDate(currentDate)}</div><div class="cycle-badge">${cInfo.label}</div>`;
            }

            calendar.appendChild(div);
            currentDate.setDate(currentDate.getDate() + 1);
        }

        function formatDate(date) {
            let options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let s = date.toLocaleDateString('fr-FR', options);
            return date.getDate() === 1 ? s.replace(" 1 ", " 1er ") : s;
        }

        function scrollToToday() {
            const today = new Date();
            const dateIso = today.toISOString().split('T')[0];
            const element = document.getElementById("date-" + dateIso);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                element.classList.add('highlight');
                setTimeout(() => element.classList.remove('highlight'), 2000);
            }
        }

        document.getElementById('datePicker').addEventListener('change', function() {
            const element = document.getElementById("date-" + this.value);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                element.classList.add('highlight');
                setTimeout(() => element.classList.remove('highlight'), 2000);
            }
        });
    </script>
</body>
</html>
