<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning 6èmes</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 10px;
            text-align: center;
        }

        .header-sticky {
            position: sticky;
            top: 0;
            background: #0f172a;
            padding: 15px 0;
            z-index: 100;
            border-bottom: 1px solid #334155;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="date"] {
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            outline: none;
        }

        .btn-today {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #calendar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 500px;
            margin: 20px auto;
        }

        .day-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-radius: 12px;
            color: #1e293b;
            font-weight: 500;
            scroll-margin-top: 140px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.3s ease; /* Transition fluide pour le surlignage */
            border: 3px solid transparent;
        }

        .cycle-badge {
            background: rgba(255, 255, 255, 0.5);
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* --- EFFET DE SURLIGNAGE --- */
        .highlight {
            border: 3px solid #ffffff !important;
            transform: scale(1.05); /* La carte grossit légèrement */
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.6); /* Halo lumineux */
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="header-sticky">
        <h1>Planning 6èmes</h1>
        <div class="controls">
            <input type="date" id="datePicker" min="2026-01-01" max="2028-12-31">
            <button class="btn-today" onclick="scrollToToday()">Aujourd'hui</button>
        </div>
    </div>

    <div id="calendar"></div>

    <script>
        const cycleData = [
            { label: "4 & 2", color: "#C1E1C1" },
            { label: "5 & 3", color: "#FFB3BA" },
            { label: "6 & 4", color: "#BDB2FF" },
            { label: "1 & 5", color: "#FFDFBA" },
            { label: "2 & 6", color: "#BAE1FF" },
            { label: "3 & 1", color: "#FFFFBA" }
        ];

        const startDate = new Date("2026-01-01");
        const endDate = new Date("2028-12-31");
        const calendar = document.getElementById("calendar");

        let currentDate = new Date(startDate);

        while (currentDate <= endDate) {
            const div = document.createElement("div");
            div.className = "day-card";
            
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const day = String(currentDate.getDate()).padStart(2, '0');
            const dateIso = `${year}-${month}-${day}`;
            div.id = "date-" + dateIso;

            const diffDays = Math.floor((currentDate - startDate) / (1000 * 60 * 60 * 24));
            const cInfo = cycleData[diffDays % cycleData.length];

            div.style.backgroundColor = cInfo.color;

            let options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let dateStr = currentDate.toLocaleDateString('fr-FR', options);
            if (currentDate.getDate() === 1) dateStr = dateStr.replace(" 1 ", " 1er ");

            div.innerHTML = `
                <div class="date-text">${dateStr}</div>
                <div class="cycle-badge">${cInfo.label}</div>
            `;

            calendar.appendChild(div);
            currentDate.setDate(currentDate.getDate() + 1);
        }

        // Action quand on change la date dans le calendrier
        document.getElementById('datePicker').addEventListener('change', function() {
            scrollToDate(this.value);
        });

        // Action pour le bouton Aujourd'hui
        function scrollToToday() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            const dateIso = `${year}-${month}-${day}`;
            scrollToDate(dateIso);
        }

        // Fonction universelle pour défiler et surligner
        function scrollToDate(id) {
            const element = document.getElementById("date-" + id);
            if (element) {
                // Défilement fluide
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // On enlève le surlignage des autres cartes s'il y en avait
                document.querySelectorAll('.day-card').forEach(el => el.classList.remove('highlight'));
                
                // On ajoute l'effet visuel
                element.classList.add('highlight');
                
                // On retire l'effet après 3 secondes pour que ça ne reste pas allumé tout le temps
                setTimeout(() => {
                    element.classList.remove('highlight');
                }, 3000);
            } else {
                alert("Date non disponible dans le planning.");
            }
        }
    </script>
</body>
</html>
