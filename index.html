<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning 6èmes 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 10px;
            text-align: center;
        }
        h1 { margin: 20px 0; font-size: 1.5rem; }
        
        #calendar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .day-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #1e293b;
            border-radius: 12px;
            border-left: 8px solid #38bdf8; /* Barre de couleur sur le côté */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .date-text {
            font-size: 1rem;
            font-weight: 500;
            text-transform: capitalize;
        }

        .cycle-info {
            background: #334155;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #fbbf24; /* Couleur or pour le cycle */
            min-width: 60px;
        }
    </style>
</head>
<body>

    <h1>Planning 6èmes 2026</h1>
    <div id="calendar"></div>

    <script>
        const cycle = ["4 & 2", "5 & 3", "6 & 4", "1 & 5", "2 & 6", "3 & 1"];
        const startDate = new Date("2026-01-01");
        const endDate = new Date("2026-12-31");
        const calendar = document.getElementById("calendar");

        let currentDate = new Date(startDate);

        while (currentDate <= endDate) {
            const div = document.createElement("div");
            div.className = "day-card";

            // Calcul du cycle
            const diffDays = Math.floor((currentDate - startDate) / (1000 * 60 * 60 * 24));
            const cycleIndex = diffDays % cycle.length;

            // Formatage de la date : "jeudi 1 janvier 2026"
            let options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let dateStr = currentDate.toLocaleDateString('fr-FR', options);

            // Petit bonus : transformer "1 janvier" en "1er janvier"
            if (currentDate.getDate() === 1) {
                dateStr = dateStr.replace(" 1 ", " 1er ");
            }

            div.innerHTML = `
                <div class="date-text">${dateStr}</div>
                <div class="cycle-info">${cycle[cycleIndex]}</div>
            `;

            calendar.appendChild(div);
            currentDate.setDate(currentDate.getDate() + 1);
        }
    </script>
</body>
</html>
