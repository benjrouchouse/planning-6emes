<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning SMT</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="1772575390613.png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #cbd5e1;
            --accent: #38bdf8;
            --text-dark: #1e293b;
            --success: #22c55e;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* --- NAVIGATION --- */
        .nav-tabs {
            display: flex;
            background: #1e293b;
            padding: 5px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.5;
            transition: 0.3s;
        }

        .tab-btn.active {
            opacity: 1;
            color: var(--accent);
        }

        .view { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- PLANNING --- */
        #calendar { display: flex; flex-direction: column; gap: 10px; max-width: 500px; margin: 0 auto; }
        .day-card { background: var(--card-bg); color: var(--text-dark); border-radius: 12px; overflow: hidden; cursor: pointer; }
        .day-card-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .day-details { max-height: 0; overflow: hidden; transition: 0.3s; background: rgba(255,255,255,0.2); }
        .day-card.active .day-details { max-height: 200px; padding: 15px; }

        /* --- TÂCHES SMS (CHECKLIST) --- */
        .cl-container { max-width: 500px; margin: 0 auto; }
        .cl-header { 
            background: #1e293b; padding: 20px; border-radius: 15px; 
            margin-bottom: 20px; text-align: center; border: 1px solid #334155;
        }
        .progress-bar { height: 12px; background: #0f172a; border-radius: 6px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .cl-item {
            background: white; color: var(--text-dark); padding: 14px;
            margin-bottom: 10px; border-radius: 12px; display: flex;
            align-items: center; cursor: pointer; transition: 0.2s;
            border-left: 5px solid var(--accent);
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .cl-item input { width: 22px; height: 22px; margin-right: 15px; cursor: pointer; accent-color: var(--success); }
        
        .cl-item .time { 
            font-weight: 800; color: #64748b; margin-right: 12px; 
            min-width: 55px; font-size: 0.85rem; background: #f1f5f9;
            padding: 4px 6px; border-radius: 6px; text-align: center;
        }

        .cl-item .icon { font-size: 1.3rem; margin-right: 12px; }
        .cl-item .text { font-weight: 500; font-size: 0.95rem; flex: 1; }

        .cl-item.done { border-left-color: var(--success); background: #f8fafc; opacity: 0.7; }
        .cl-item.done .text { text-decoration: line-through; color: #94a3b8; }

        .btn-reset {
            width: 100%; padding: 16px; background: #ef4444; color: white;
            border: none; border-radius: 12px; font-weight: bold; margin-top: 20px;
            font-size: 1rem; box-shadow: 0 4px 0 #b91c1c;
        }
        .btn-reset:active { transform: translateY(2px); box-shadow: none; }

        #counter-section { text-align: center; margin-top: 40px; padding: 20px; opacity: 0.4; font-size: 0.7rem; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <button id="btn-plan" class="tab-btn active" onclick="switchView('planning')">📅 CALENDRIER</button>
        <button id="btn-sms" class="tab-btn" onclick="switchView('sms')">📋 TÂCHES SMS</button>
    </nav>

    <div id="planning-view" class="view active">
        <div style="text-align:center; margin-bottom:20px;">
            <h2 style="margin:0 0 15px 0">Planning SMT 2026</h2>
            <button class="btn-reset" style="background:var(--accent); box-shadow:0 4px 0 #0284c7; width:auto; padding:10px 20px;" onclick="scrollToToday()">Aller à Aujourd'hui</button>
        </div>
        <div id="calendar"></div>
    </div>

    <div id="sms-view" class="view">
        <div class="cl-container">
            <div class="cl-header">
                <div id="cl-count" style="font-weight: bold; color: var(--accent); font-size: 1.1rem;">0 / 14 tâches effectuées</div>
                <div class="progress-bar"><div id="cl-bar" class="progress-fill"></div></div>
            </div>

            <div id="checklist-list">
                </div>

            <button class="btn-reset" onclick="resetChecklist()">🔄 RÉINITIALISER LA GARDE</button>
        </div>
    </div>

    <div id="counter-section">
        <div id="sfc68u3z7f41qjpyh46j7y1k415r2j2g791"></div>
        <script type="text/javascript" src="https://counter9.optistats.ovh/private/counter.js?c=68u3z7f41qjpyh46j7y1k415r2j2g791&down=async" async></script>
    </div>

    <script>
        // --- DONNÉES CHRONOLOGIQUES AVEC LOGOS ---
        const tasks = [
            { t: "07h10", d: "Passation SMS", i: "🤝" },
            { t: "07h20", d: "Vérif feuille de garde + VRCC", i: "🚔" },
            { t: "07h30", d: "Appel du personnel", i: "📢" },
            { t: "08h30", d: "Vérification des chambrées", i: "🛌" },
            { t: "09h30", d: "Inventaires SKYUREL", i: "🐿️" },
            { t: "14h00", d: "Appel du personnel", i: "📢" },
            { t: "17h00", d: "Désarmer la VRCC", i: "🔓" },
            { t: "17h30", d: "Couleurs (Cf État Major)", i: "🇫🇷" },
            { t: "19h00", d: "Si corvée : Kimoce", i: "💻" },
            { t: "19h30", d: "Tableau des postes (Demain)", i: "📝" },
            { t: "20h00", d: "Désarmer le VSAV 2", i: "🚑" },
            { t: "22h00", d: "Passer la feuille de garde", i: "📁" },
            { t: "22h10", d: "Ronde SMS", i: "🔦" },
            { t: "22h30", d: "Vérification cahier cuisine", i: "🍳" }
        ];

        function switchView(name) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name + '-view').classList.add('active');
            document.getElementById('btn-' + (name === 'planning' ? 'plan' : 'sms')).classList.add('active');
            window.scrollTo(0,0);
        }

        function loadChecklist() {
            const list = document.getElementById('checklist-list');
            const saved = JSON.parse(localStorage.getItem('smt_tasks')) || {};
            list.innerHTML = tasks.map((task, i) => `
                <div class="cl-item ${saved[i] ? 'done' : ''}" onclick="toggleTask(${i})">
                    <input type="checkbox" ${saved[i] ? 'checked' : ''} onclick="event.stopPropagation(); toggleTask(${i})">
                    <span class="time">${task.t}</span>
                    <span class="icon">${task.i}</span>
                    <span class="text">${task.d}</span>
                </div>
            `).join('');
            updateProgress();
        }

        function toggleTask(i) {
            let saved = JSON.parse(localStorage.getItem('smt_tasks')) || {};
            saved[i] = !saved[i];
            localStorage.setItem('smt_tasks', JSON.stringify(saved));
            if (window.navigator.vibrate) window.navigator.vibrate(20);
            loadChecklist();
        }

        function updateProgress() {
            const saved = JSON.parse(localStorage.getItem('smt_tasks')) || {};
            const done = Object.values(saved).filter(v => v).length;
            const percent = (done / tasks.length) * 100;
            document.getElementById('cl-count').innerText = `${done} / ${tasks.length} tâches effectuées`;
            document.getElementById('cl-bar').style.width = percent + '%';
        }

        function resetChecklist() {
            if(confirm("Réinitialiser la journée ?")) {
                localStorage.removeItem('smt_tasks');
                loadChecklist();
            }
        }

        // --- GÉNÉRATION CALENDRIER ---
        const cycle = ["4 & 2", "5 & 3", "6 & 4", "1 & 5", "2 & 6", "3 & 1"];
        const calendar = document.getElementById("calendar");
        let d = new Date(2026, 0, 1);
        while(d.getFullYear() === 2026) {
            const iso = d.toISOString().split('T')[0];
            const diff = Math.floor((d - new Date(2026,0,1))/(1000*60*60*24));
            const card = document.createElement('div');
            card.id = "date-"+iso;
            card.className = "day-card";
            card.innerHTML = `
                <div class="day-card-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${d.toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'short'})}</span>
                    <div style="background:rgba(0,0,0,0.1); padding:4px 10px; border-radius:10px;">${cycle[diff % 6]}</div>
                </div>
                <div class="day-details">Vérification matériel selon planning.</div>
            `;
            calendar.appendChild(card);
            d.setDate(d.getDate()+1);
        }

        function scrollToToday() {
            const iso = new Date().toISOString().split('T')[0];
            const el = document.getElementById("date-"+iso);
            if(el) {
                el.scrollIntoView({behavior:'smooth', block:'center'});
                el.style.border = "3px solid #38bdf8";
            }
        }

        loadChecklist();
    </script>
</body>
</html>
