<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning 6èmes</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 0;
}

header {
    padding: 15px;
    background: #1e293b;
    text-align: center;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    flex-wrap: wrap;
}

button, select, input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
}

button {
    background: #2563eb;
    color: white;
    cursor: pointer;
}

#calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    padding: 10px;
}

.day {
    background: #1e293b;
    padding: 8px;
    border-radius: 8px;
    font-size: 12px;
}

.day strong {
    display: block;
    margin-top: 4px;
}

/* Couleurs par sixième */
.c42 { background: #1e3a8a; }
.c53 { background: #166534; }
.c64 { background: #7c2d12; }
.c15 { background: #6b21a8; }
.c26 { background: #92400e; }
.c31 { background: #0e7490; }

.today {
    border: 2px solid yellow;
}
</style>
</head>

<body>

<header>
<h2>Planning 6èmes</h2>
</header>

<div class="controls">
<select id="yearSelect"></select>
<input type="date" id="searchDate">
<button onclick="goToDate()">Rechercher</button>
<button onclick="window.print()">Exporter PDF</button>
</div>

<div id="calendar"></div>

<script>

const cycle = [
    {text:"4 & 2", class:"c42"},
    {text:"5 & 3", class:"c53"},
    {text:"6 & 4", class:"c64"},
    {text:"1 & 5", class:"c15"},
    {text:"2 & 6", class:"c26"},
    {text:"3 & 1", class:"c31"}
];

const startReference = new Date("2026-01-01");
const calendar = document.getElementById("calendar");
const yearSelect = document.getElementById("yearSelect");

for (let y = 2025; y <= 2030; y++) {
    let option = document.createElement("option");
    option.value = y;
    option.text = y;
    yearSelect.appendChild(option);
}

yearSelect.value = 2026;
yearSelect.addEventListener("change", generateCalendar);

function generateCalendar() {

    calendar.innerHTML = "";

    const selectedYear = parseInt(yearSelect.value);
    const startDate = new Date(selectedYear + "-01-01");
    const endDate = new Date(selectedYear + "-12-31");

    let currentDate = new Date(startDate);

    while (currentDate <= endDate) {

        let diffDays = Math.floor((currentDate - startReference) / (1000*60*60*24));
        let cycleIndex = ((diffDays % cycle.length) + cycle.length) % cycle.length;

        let dayDiv = document.createElement("div");
        dayDiv.className = "day " + cycle[cycleIndex].class;

        let today = new Date();
        if (currentDate.toDateString() === today.toDateString()) {
            dayDiv.classList.add("today");
        }

        dayDiv.innerHTML = `
            ${currentDate.getDate()}/${currentDate.getMonth()+1}
            <strong>${cycle[cycleIndex].text}</strong>
        `;

        dayDiv.id = currentDate.toISOString().split("T")[0];

        calendar.appendChild(dayDiv);
        currentDate.setDate(currentDate.getDate() + 1);
    }
}

function goToDate() {
    let date = document.getElementById("searchDate").value;
    if(date) {
        document.getElementById(date)?.scrollIntoView({behavior:"smooth"});
    }
}

generateCalendar();

</script>

</body>
</html>
