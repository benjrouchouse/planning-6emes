<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMS SMT 2026</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #0f172a; --accent: #38bdf8; --success: #22c55e;
            --card-bg: #1e293b; --text: #f8fafc; --warning: #f59e0b;
            --vacation: #a855f7;
        }
        body.night-mode {
            --bg: #000; --accent: #ff0000; --card-bg: #1a0000;
            --text: #ff4444; --success: #880000; --vacation: #550055;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            transition: 0.3s; padding-bottom: 40px; -webkit-user-select: none;
        }

        /* LOGO INTEGRÉ */
        .header-logo { text-align: center; margin-top: 20px; }
        .logo-img {
            width: 120px; height: 120px; border-radius: 50%;
            border: 2px solid var(--accent);
            background-image: url('https://i.ibb.co/XfXfXfX/logo-smt.png'); /* Simulation ou ton image encodée */
            background-size: cover; display: inline-block;
        }

        /* DASHBOARD */
        .nav-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; padding: 15px; max-width: 500px; margin: 0 auto;
        }
        .nav-btn {
            background: var(--card-bg); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; aspect-ratio: 1 / 1;
            font-weight: bold; border: 1px solid #334155; transition: 0.1s;
        }
        .nav-btn:active { transform: scale(0.95); }
        .nav-btn span.emoji { font-size: 2.5rem; margin-bottom: 10px; }

        /* VUES */
        .view { display: none; padding: 15px; animation: fadeIn 0.2s; }
        .view.active { display: block; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px; border-radius: 10px; margin-bottom: 15px; cursor: pointer; }

        /* CALENDRIER */
        #today-btn { 
            width: 100%; display: flex; align-items: center; justify-content: center; 
            gap: 10px; background: var(--card-bg); border: 1px solid var(--accent); 
            border-radius: 12px; padding: 15px; cursor: pointer; font-weight: bold; color: var(--accent);
            margin-bottom: 20px;
        }
        .mini-logo { width: 25px; height: 25px; border-radius: 50%; border: 1px solid var(--accent); }

        .day-card { border-radius: 12px; color: #1e293b; margin-bottom: 10px; overflow: hidden; border: 3px solid transparent; }
        .day-card.work-day { background: #cbd5e1; }
        .day-card.weekend { background: #475569; color: white; }
        .day-card.vacation { background: var(--vacation); color: white; }
        .day-card.today { border-color: #ef4444; }
        
        .card-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .details { max-height: 0; overflow: hidden; transition: 0.3s; background: rgba(255,255,255,0.2); font-size: 0.85rem; }
        .day-card.active .details { max-height: 500px; padding: 15px; }

        .cl-item { background: white; color: #1e293b; padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; align-items: center; border-left: 5px solid var(--accent); }
        .cl-item.done { opacity: 0.4; border-left-color: var(--success); }
        .btn-wa { width: 100%; background: #25d366; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div style="display:flex; justify-content: space-between; padding: 10px 20px;">
        <h2 style="margin:0; color:var(--accent);">SMS SMT</h2>
        <button onclick="document.body.classList.toggle('night-mode')" style="background:var(--card-bg); border:1px solid var(--accent); color:var(--accent); border-radius:50%; width:35px; height:35px;">🌙</button>
    </div>

    <div class="header-logo">
        <img src="image_0.png" onerror="this.style.display='none'; document.getElementById('alt-logo').style.display='block';" style="width:120px; border-radius:50%;">
        <div id="alt-logo" style="display:none; font-size: 3rem;">🚒</div>
    </div>

    <div id="menu-view" class="view active">
        <div class="nav-grid">
            <div id="btn-cal" class="nav-btn" onclick="switchView('planning')"><span class="emoji">📅</span>Planning</div>
            <div class="nav-btn" onclick="switchView('sms')"><span class="emoji">✅</span>SMS</div>
            <div class="nav-btn" onclick="switchView('proc')"><span class="emoji">📚</span>Procédures</div>
            <div class="nav-btn" onclick="switchView('passation')"><span class="emoji">📝</span>Passation</div>
        </div>
        <p id="info-relance" style="text-align:center; opacity:0.6; font-size:0.9rem; font-weight:bold;"></p>
    </div>

    <div id="planning-view" class="view">
        <button class="back-btn" onclick="switchView('menu')">← Menu</button>
        <button id="today-btn" onclick="scrollToToday()">
             Revenir à aujourd'hui
        </button>
        <div id="calendar-container"></div>
    </div>

    <div id="sms-view" class="view">
        <button class="back-btn" onclick="switchView('menu')">← Menu</button>
        <div id="sms-list"></div>
        <button onclick="resetSMS()" style="width:100%; background:#ef4444; color:white; border:none; padding:15px; border-radius:12px; font-weight:bold; margin-top:10px;">🔄 RÉINITIALISER</button>
    </div>

    <div id="proc-view" class="view">
        <button class="back-btn" onclick="switchView('menu')">← Menu</button>
        <div style="background:var(--card-bg); padding:15px; border-radius:15px; border:1px solid #334155;">
            <h3 style="color:var(--accent);">⛽ Carburant Jeudi</h3>
            Saisie Kimoce avant 12h.<br>Scan BL à : <i>gp_piecesengins@intrabat.bmpm.fr</i>
        </div>
    </div>

    <div id="passation-view" class="view">
        <button class="back-btn" onclick="switchView('menu')">← Menu</button>
        <textarea id="memo" class="memo-area" style="width:100%; height:200px; background:var(--card-bg); color:white; border-radius:12px; padding:10px;" oninput="localStorage.setItem('smt_memo', this.value)"></textarea>
        <button class="btn-wa" onclick="shareWA()">📤 Partager par WhatsApp</button>
    </div>

<script>
    const cycle = ["6 & 4", "1 & 5", "2 & 6", "3 & 1", "4 & 2", "5 & 3"];
    const baseDate = new Date(2026, 2, 10); // 10 Mars 2026 = 6&4
    const vacancesB = [{s:"2026-02-14",e:"2026-03-01"},{s:"2026-04-11",e:"2026-04-26"},{s:"2026-07-04",e:"2026-08-31"},{s:"2026-10-17",e:"2026-11-01"},{s:"2026-12-19",e:"2026-12-31"}];

    function getTasks(d) {
        const day = d.getDay();
        if(day===1) return "MATIN: Code d'honneur, EPI, ARI. APRÈS-MIDI: Sport.";
        if(day===2) return "MATIN: Échelles, Lot Tramway. APRÈS-MIDI: Renfo.";
        if(day===3) return "MATIN: Thermiques. APRÈS-MIDI: Mise en pompe.";
        if(day===4) return "MATIN: LSPCC, Sac PS. Cuves Gasoil. APRÈS-MIDI: Services.";
        if(day===5) return "MATIN: Pneumatiques. APRÈS-MIDI: Services.";
        if(day===6) return "Manœuvre SR. APRÈS-MIDI: Containers.";
        if(day===0) return "Protocole VSAV, Commande O2, Inventaire CCF.";
        return "";
    }

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id + '-view').classList.add('active');
        window.scrollTo(0,0);
    }

    function scrollToToday() {
        const isoToday = new Date().toISOString().split('T')[0];
        const card = document.getElementById("date-" + isoToday);
        if(card) {
            card.classList.add('active');
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function init() {
        const today = new Date();
        const isoToday = today.toISOString().split('T')[0];
        const cal = document.getElementById('calendar-container');
        let d = new Date(2026, 0, 1);
        let dayCounter = 0;
        const offset = 4; // Alignement 10 Mars sur 6&4

        while(d.getFullYear() === 2026) {
            const iso = d.toISOString().split('T')[0];
            const isVac = vacancesB.some(v => iso >= v.s && iso <= v.e);
            const isToday = iso === isoToday;
            
            const card = document.createElement('div');
            card.id = "date-" + iso;
            card.className = `day-card ${isVac?'vacation':(d.getDay()==0||d.getDay()==6?'weekend':'work-day')} ${isToday?'today active':''}`;
            card.innerHTML = `
                <div class="card-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})} ${isVac?'🏖️':''}</span>
                    <span style="background:rgba(0,0,0,0.1);padding:4px 8px;border-radius:8px;">${cycle[(dayCounter+offset)%6]}</span>
                </div>
                <div class="details">${getTasks(d)}</div>
            `;
            cal.appendChild(card);
            if(isToday) document.getElementById('info-relance').innerText = `Aujourd'hui : ${cycle[(dayCounter+offset)%6]}`;
            d.setDate(d.getDate()+1); dayCounter++;
        }

        const smsTasks = ["07:10 Passation","08:30 Chambrées","09:30 SKYUREL","17:30 Couleurs","19:00 KIMOCE","22:00 Ronde"];
        const saved = JSON.parse(localStorage.getItem('smt_sms')) || {};
        document.getElementById('sms-list').innerHTML = smsTasks.map((t,i) => `
            <div class="cl-item ${saved[i]?'done':''}" onclick="toggleSMS(${i})">
                <input type="checkbox" ${saved[i]?'checked':''}><span>${t}</span>
            </div>`).join('');
        document.getElementById('memo').value = localStorage.getItem('smt_memo') || "";
    }

    function toggleSMS(i) {
        let saved = JSON.parse(localStorage.getItem('smt_sms')) || {};
        saved[i] = !saved[i];
        localStorage.setItem('smt_sms', JSON.stringify(saved));
        location.reload();
    }
    function resetSMS() { if(confirm("Reset ?")) { localStorage.removeItem('smt_sms'); location.reload(); }}
    function shareWA() { window.location.href = "whatsapp://send?text=" + encodeURIComponent(document.getElementById('memo').value); }

    window.onload = init;
</script>
</body>
</html>
