<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planning SMT</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#38bdf8;
--success:#22c55e;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:white;
}

/* NAV */

.nav-tabs{
display:flex;
background:var(--card);
position:sticky;
top:0;
z-index:1000;
}

.tab-btn{
flex:1;
padding:12px;
border:none;
background:none;
color:white;
font-weight:bold;
opacity:.5;
cursor:pointer;
}

.tab-btn.active{
opacity:1;
color:var(--accent);
}

/* VIEWS */

.view{
display:none;
padding:10px;
}

.view.active{
display:block;
}

/* CALENDAR */

#calendar{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.day-card{
background:#cbd5e1;
color:#1e293b;
border-radius:10px;
padding:15px;
cursor:pointer;
}

.weekend{
background:#475569;
color:white;
}

/* SMS */

.cl-item{
background:white;
color:#1e293b;
padding:12px;
margin-bottom:6px;
border-radius:10px;
display:flex;
align-items:center;
cursor:pointer;
}

.cl-item.done{
opacity:.5;
text-decoration:line-through;
}

.progress-bar{
height:10px;
background:#0f172a;
border-radius:5px;
margin-top:10px;
}

.progress-fill{
height:100%;
background:var(--success);
width:0%;
}

/* PROCEDURES */

.proc-card{
background:var(--card);
border-radius:10px;
margin-bottom:10px;
}

.proc-header{
padding:15px;
cursor:pointer;
font-weight:bold;
}

.proc-content{
display:none;
padding:10px;
}

.proc-card.active .proc-content{
display:block;
}

/* MEMO */

.memo-block{
background:var(--card);
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.memo-block textarea{
width:100%;
height:70px;
border:none;
border-radius:8px;
padding:8px;
resize:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:var(--accent);
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

.btn-reset{
background:#ef4444;
color:white;
width:100%;
}

</style>
</head>

<body>

<nav class="nav-tabs">

<button class="tab-btn active" onclick="switchView('planning')">Calendrier</button>

<button class="tab-btn" onclick="switchView('sms')">Tâches SMS</button>

<button class="tab-btn" onclick="switchView('proc')">Procédures</button>

<button class="tab-btn" onclick="switchView('memo')">Passation</button>

</nav>

<!-- CALENDAR -->

<div id="planning-view" class="view active">

<h2>Planning 2026</h2>

<div id="calendar"></div>

</div>

<!-- SMS -->

<div id="sms-view" class="view">

<h2>Tâches SMS</h2>

<button onclick="startShift()">🚨 Début de garde</button>

<div id="cl-count"></div>

<div class="progress-bar">
<div id="cl-bar" class="progress-fill"></div>
</div>

<div id="checklist"></div>

<button class="btn-reset" onclick="resetChecklist()">Réinitialiser</button>

</div>

<!-- PROCEDURES -->

<div id="proc-view" class="view">

<h2>Procédures</h2>

<div class="proc-card">

<div class="proc-header" onclick="toggleProc(this)">
☎️ Numéros utiles
</div>

<div class="proc-content">

Standard BMPM : 04.96.11.75.00<br>
CODIS : 18 / 112

</div>

</div>

</div>

<!-- MEMO -->

<div id="memo-view" class="view">

<h2>📝 Passation SMS</h2>

<div class="memo-block">
🚒 Interventions
<textarea id="memo_inter"></textarea>
</div>

<div class="memo-block">
⚙️ Matériel
<textarea id="memo_matos"></textarea>
</div>

<div class="memo-block">
📦 Commandes
<textarea id="memo_log"></textarea>
</div>

<div class="memo-block">
👨‍🚒 Personnel
<textarea id="memo_pers"></textarea>
</div>

<div class="memo-block">
⚠️ Divers
<textarea id="memo_div"></textarea>
</div>

<button onclick="generatePassation()">📋 Générer la passation</button>

<textarea id="passationResult" style="width:100%;height:140px;margin-top:10px;"></textarea>

<button onclick="copyPassation()">📄 Copier</button>

<button class="btn-reset" onclick="resetMemo()">Effacer la passation</button>

</div>

<script>

/* NAVIGATION */

function switchView(name){

document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"))

document.getElementById(name+"-view").classList.add("active")

}

/* CALENDAR */

const calendar=document.getElementById("calendar")

let d=new Date(2026,0,1)

while(d.getFullYear()==2026){

let card=document.createElement("div")

card.className="day-card"

if(d.getDay()==0 || d.getDay()==6)
card.classList.add("weekend")

card.innerText=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})

calendar.appendChild(card)

d.setDate(d.getDate()+1)

}

/* SMS TASKS */

const tasks=[
"Passation SMS",
"Vérification feuille de garde",
"Appel personnel",
"Inspection chambrées",
"Inventaire SKYUREL",
"Appel personnel 14h",
"Désarmer VRCC",
"Couleurs",
"Kimoce",
"Tableau postes",
"Désarmer VSAV2",
"Feuille de garde",
"Ronde SMS",
"Cahier cuisine"
]

function loadChecklist(){

let saved=JSON.parse(localStorage.getItem("tasks")||"{}")

let list=document.getElementById("checklist")

list.innerHTML=""

tasks.forEach((t,i)=>{

let div=document.createElement("div")

div.className="cl-item"+(saved[i]?" done":"")

div.innerText=t

div.onclick=()=>toggleTask(i)

list.appendChild(div)

})

updateProgress()

}

function toggleTask(i){

let saved=JSON.parse(localStorage.getItem("tasks")||"{}")

saved[i]=!saved[i]

localStorage.setItem("tasks",JSON.stringify(saved))

loadChecklist()

}

function updateProgress(){

let saved=JSON.parse(localStorage.getItem("tasks")||"{}")

let done=Object.values(saved).filter(v=>v).length

document.getElementById("cl-count").innerText=done+" / "+tasks.length

document.getElementById("cl-bar").style.width=(done/tasks.length*100)+"%"

}

function resetChecklist(){

localStorage.removeItem("tasks")

loadChecklist()

}

/* START SHIFT */

function startShift(){

if(confirm("Nouvelle garde ?")){

resetChecklist()

resetMemo()

}

}

/* PROCEDURES */

function toggleProc(el){

el.parentElement.classList.toggle("active")

}

/* MEMO */

const memoFields=[
"memo_inter",
"memo_matos",
"memo_log",
"memo_pers",
"memo_div"
]

function loadMemo(){

memoFields.forEach(id=>{

let el=document.getElementById(id)

el.value=localStorage.getItem(id)||""

el.oninput=()=>localStorage.setItem(id,el.value)

})

}

function resetMemo(){

memoFields.forEach(id=>{

localStorage.removeItem(id)

document.getElementById(id).value=""

})

}

/* PASSATION */

function generatePassation(){

let txt="PASSATION SMS\n\n"

txt+="INTERVENTIONS\n"+memo_inter.value+"\n\n"

txt+="MATERIEL\n"+memo_matos.value+"\n\n"

txt+="COMMANDES\n"+memo_log.value+"\n\n"

txt+="PERSONNEL\n"+memo_pers.value+"\n\n"

txt+="DIVERS\n"+memo_div.value

document.getElementById("passationResult").value=txt

}

function copyPassation(){

let field=document.getElementById("passationResult")

field.select()

document.execCommand("copy")

}

/* INIT */

loadChecklist()

loadMemo()

</script>

</body>
</html>
