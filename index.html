<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning 6èmes 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 10px;
            text-align: center;
        }

        .header-sticky {
            position: sticky;
            top: 0;
            background: #0f172a;
            padding: 15px 0;
            z-index: 100;
            border-bottom: 1px solid #334155;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="date"] {
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
        }

        .btn-today {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        #calendar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 500px;
            margin: 20px auto;
        }

        .day-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #1e293b; /* Fond de carte neutre */
            border-radius: 12px;
            scroll-margin-top: 140px;
            border: 1px solid #334155;
        }

        .date-text {
            font-size: 0.95rem;
            text-transform: capitalize;
            color: #e2e8f0;
        }

        .badges-container {
            display: flex;
            gap: 5px;
        }

        .class-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            color: #1e293b; /* Texte foncé pour lisibilité sur pastel */
            font-size: 1rem;
        }

        .highlight {
            border: 2px solid #38bdf8;
            background: #2d3748;
        }
    </style>
</head>
<body>

    <div class="header-sticky">
        <h1>Planning 6èmes 2026</h1>
        <div class="controls">
            <input type="date" id="datePicker">
            <button class="btn-today" onclick="scrollToToday()">Aujourd'hui</button>
        </div>
    </div>

    <div id="calendar"></div>

    <script>
        // On définit une couleur pastel fixe pour chaque numéro de 6ème
        const classColors = {
            "1": "#BAE1FF", // Bleu ciel
            "2": "#C1E1C1", // Vert menthe
            "3": "#FFFFBA", // Jaune beurre
            "4": "#FFB3BA", // Rose corail
            "5": "#FFDFBA", // Abricot
            "6": "#BDB2FF"  // Lavande
        };

        const cycle = ["4 & 2", "5 & 3", "6 & 4", "1 & 5", "2 & 6", "3 & 1"];
        const startDate = new Date("2026-01-01");
        const endDate = new Date("2026-12-31");
        const calendar = document.getElementById("calendar");

        let currentDate = new Date(startDate);

        while (currentDate <= endDate) {
            const div = document.createElement("div");
            div.className = "day-card";
            const dateIso = currentDate.toISOString().split('T')[0];
            div.id = "date-" + dateIso;

            const diffDays = Math.floor((currentDate - startDate) / (1000 * 60 * 60 * 24));
            const currentPair = cycle[diffDays % cycle.length]; // Ex: "4 & 2"
            
            // On sépare les deux chiffres pour leur donner leur couleur respective
            const classes = currentPair.split(" & "); 

            let options = { weekday: 'long', day: 'numeric', month: 'long' };
            let dateStr = currentDate.toLocaleDateString('fr-FR', options);
            if (currentDate.getDate() === 1) dateStr = dateStr.replace(" 1 ", " 1er ");

            div.innerHTML = `
                <div class="date-text">${dateStr}</div>
                <div class="badges-container">
                    <span class="class-badge" style="background:${classColors[classes[0]]}">${classes[0]}</span>
                    <span style="color:white; font-weight:bold; align-self:center;">&</span>
                    <span class="class-badge" style="background:${classColors[classes[1]]}">${classes[1]}</span>
                </div>
            `;

            calendar.appendChild(div);
            currentDate.setDate(currentDate.getDate() + 1);
        }

        // --- Fonctions de navigation ---
        document.getElementById('datePicker').addEventListener('change', function() {
            scrollToDate(this.value);
        });

        function scrollToToday() {
            const today = new Date();
            const dateIso = "2026-" + String(today.getMonth() + 1).padStart(2, '0') + "-" + String(today.getDate()).padStart(2, '0');
            scrollToDate(dateIso);
        }

        function scrollToDate(id) {
            const element = document.getElementById("date-" + id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
                element.classList.add('highlight');
                setTimeout(() => element.classList.remove('highlight'), 2000);
            }
        }
    </script>
</body>
</html>
